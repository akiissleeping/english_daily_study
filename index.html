<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily English - 毎日15分英語学習</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --primary-dark: #3730a3;
      --secondary: #0ea5e9;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.12);
    }
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Animations */
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
    @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-6px); } 75% { transform:translateX(6px); } }
    @keyframes pop { 0% { transform:scale(0.8); opacity:0; } 60% { transform:scale(1.1); } 100% { transform:scale(1); opacity:1; } }
    @keyframes timerPulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }

    .fade-in { animation: fadeIn .3s ease; }
    .animate-pop { animation: pop .4s ease; }

    /* Layout */
    .app-container { max-width: 820px; margin: 0 auto; padding: 0 16px 40px; }

    /* Header */
    .app-header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #0ea5e9 100%);
      padding: 20px 24px;
      color: white;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(79,70,229,.3);
    }
    .header-inner { max-width: 820px; margin: 0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .header-title { font-size: 1.25rem; font-weight: 700; letter-spacing: -.02em; }
    .header-date { font-size: .8rem; opacity: .85; margin-top: 2px; }
    .header-streak { background: rgba(255,255,255,.2); border-radius: 20px; padding: 6px 14px; font-size: .85rem; font-weight: 600; display:flex; align-items:center; gap:6px; }

    /* Section Tabs */
    .section-tabs { display:flex; gap:6px; margin: 20px 0 16px; overflow-x:auto; padding-bottom: 2px; }
    .section-tabs::-webkit-scrollbar { height: 0; }
    .tab-btn {
      display:flex; align-items:center; gap:8px; padding: 10px 16px;
      border-radius: 10px; border: 2px solid var(--border);
      background: var(--surface); color: var(--text-muted);
      cursor:pointer; font-size: .85rem; font-weight: 500;
      transition: all .2s; white-space:nowrap; flex-shrink: 0;
    }
    .tab-btn:hover { border-color: var(--primary-light); color: var(--primary); background: #eef2ff; }
    .tab-btn.active {
      border-color: var(--primary); background: var(--primary);
      color: white; box-shadow: 0 4px 12px rgba(79,70,229,.3);
    }
    .tab-btn .tab-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,.25); font-size: .7rem;
      display:flex; align-items:center; justify-content:center; font-weight:700;
    }
    .tab-btn:not(.active) .tab-num { background: var(--surface2); color: var(--text-muted); }
    .tab-btn.done .check { color: var(--success); }

    /* Card */
    .card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border);
      padding: 20px; margin-bottom: 14px;
    }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; display:flex; align-items:center; gap:8px; }
    .card-subtitle { font-size: .8rem; color: var(--text-muted); margin-top: 2px; font-weight: 400; }

    /* Timer */
    .timer-bar { display:flex; align-items:center; gap:12px; background: var(--surface); border-radius: 10px; padding: 12px 16px; border: 1px solid var(--border); margin-bottom: 14px; box-shadow: var(--shadow); }
    .timer-display { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--primary); min-width: 70px; }
    .timer-display.warning { color: var(--warning); animation: timerPulse 1s ease infinite; }
    .timer-display.danger { color: var(--danger); animation: timerPulse .5s ease infinite; }
    .timer-label { font-size: .8rem; color: var(--text-muted); }
    .timer-progress { flex:1; height:6px; background: var(--surface2); border-radius: 3px; overflow:hidden; }
    .timer-progress-fill { height:100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; transition: width .5s linear; }
    .timer-btn { padding: 8px 14px; border-radius: 8px; border: none; cursor:pointer; font-size: .8rem; font-weight: 600; transition: all .2s; }
    .timer-btn.start { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .timer-btn.pause { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .timer-btn.reset { background: var(--surface2); color: var(--text-muted); }
    .timer-btn:hover { filter: brightness(1.1); }

    /* Vocab */
    .vocab-grid { display:grid; gap:10px; }
    .vocab-item { border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor:pointer; transition: all .2s; }
    .vocab-item:hover { border-color: var(--primary-light); background: #eef2ff; }
    .vocab-item.expanded { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    .vocab-word { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
    .vocab-phonetic { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
    .vocab-meaning { font-size: .95rem; color: var(--text); font-weight: 600; margin-top: 8px; }
    .vocab-example { font-size: .85rem; color: var(--text-muted); margin-top: 6px; font-style: italic; }
    .vocab-example-ja { font-size: .8rem; color: var(--text-light); margin-top: 3px; }
    .vocab-tag { display:inline-block; padding: 2px 8px; border-radius: 12px; font-size: .7rem; font-weight: 600; background: #eef2ff; color: var(--primary); margin-right: 4px; }

    /* Quiz */
    .quiz-section { margin-top: 8px; }
    .quiz-question { font-size: .9rem; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .quiz-options { display:grid; gap:8px; }
    .quiz-opt {
      padding: 10px 14px; border-radius: 8px; border: 2px solid var(--border);
      background: var(--surface); cursor:pointer; font-size: .85rem;
      transition: all .2s; text-align:left;
    }
    .quiz-opt:hover:not(:disabled) { border-color: var(--primary-light); background: #eef2ff; }
    .quiz-opt.correct { border-color: var(--success); background: #ecfdf5; color: #065f46; }
    .quiz-opt.wrong { border-color: var(--danger); background: #fef2f2; color: #7f1d1d; animation: shake .3s ease; }
    .quiz-opt.disabled { cursor:default; }
    .quiz-result { display:flex; align-items:center; gap:8px; padding: 10px 14px; border-radius: 8px; font-size: .85rem; font-weight: 600; margin-top: 10px; }
    .quiz-result.correct { background: #ecfdf5; color: #065f46; }
    .quiz-result.wrong { background: #fef2f2; color: #7f1d1d; }
    .quiz-nav { display:flex; align-items:center; justify-content:space-between; margin-top: 14px; }
    .quiz-progress { font-size: .8rem; color: var(--text-muted); }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor:pointer; font-size: .85rem; font-weight: 600; transition: all .2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-secondary:hover { background: var(--border); }
    .btn-success { background: var(--success); color: white; }
    .btn:disabled { opacity: .5; cursor:not-allowed; }

    /* Score */
    .score-badge { display:inline-flex; align-items:center; gap:4px; padding: 4px 12px; border-radius: 20px; font-size: .8rem; font-weight: 700; }
    .score-badge.good { background: #ecfdf5; color: #065f46; }
    .score-badge.ok { background: #fffbeb; color: #78350f; }
    .score-badge.bad { background: #fef2f2; color: #7f1d1d; }

    /* Listening */
    .script-display {
      background: var(--surface2); border-radius: 10px; padding: 16px;
      font-size: .9rem; line-height: 1.9; color: var(--text);
      border: 1px solid var(--border);
    }
    .blank-input {
      display:inline-block; border-bottom: 2px solid var(--primary);
      min-width: 90px; padding: 0 4px; font-size: .9rem;
      font-family: inherit; background: #eef2ff; border-radius: 4px 4px 0 0;
      color: var(--text); outline:none; text-align:center;
    }
    .blank-input.correct { border-color: var(--success); background: #ecfdf5; }
    .blank-input.wrong { border-color: var(--danger); background: #fef2f2; }
    .blank-input:focus { background: #e0e7ff; }
    .hint-text { font-size: .7rem; color: var(--text-light); display:block; text-align:center; }

    /* Reading */
    .reading-text {
      background: var(--surface2); border-radius: 10px; padding: 18px;
      font-size: .9rem; line-height: 1.9; color: var(--text);
      border: 1px solid var(--border); white-space: pre-line;
    }
    .highlight { background: #fef3c7; border-radius: 3px; padding: 0 2px; }

    /* Expression */
    .expression-card { background: linear-gradient(135deg, #eef2ff, #e0e7ff); border-radius: 10px; padding: 14px; border: 1px solid #c7d2fe; }
    .expression-text { font-size: .95rem; font-weight: 700; color: var(--primary-dark); }
    .expression-usage { font-size: .75rem; color: var(--primary); font-weight: 600; margin-top: 4px; }
    .expression-example { font-size: .8rem; color: var(--text-muted); margin-top: 6px; font-style: italic; }

    /* Training */
    .step-tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom: 2px; margin-bottom: 14px; }
    .step-tab {
      padding: 8px 14px; border-radius: 8px; border: 2px solid var(--border);
      background: var(--surface); color: var(--text-muted); cursor:pointer;
      font-size: .8rem; font-weight: 600; white-space:nowrap; flex-shrink:0;
      transition: all .2s;
    }
    .step-tab.active { border-color: var(--primary); background: var(--primary); color: white; }
    .step-tab.done { border-color: var(--success); color: var(--success); }
    .step-badge { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:rgba(255,255,255,.25); font-size:.65rem; font-weight:700; margin-right:4px; }
    .step-tab:not(.active) .step-badge { background: var(--surface2); color: var(--text-muted); }

    .training-step { animation: fadeIn .3s ease; }
    .step-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
    .step-instruction { font-size: .85rem; color: var(--text); line-height: 1.6; margin-bottom: 10px; padding: 12px; background: #eef2ff; border-radius: 8px; border-left: 3px solid var(--primary); }
    .step-tip { font-size: .8rem; color: var(--text-muted); padding: 10px 12px; background: #fffbeb; border-radius: 8px; border-left: 3px solid var(--accent); }
    .tip-label { font-weight: 700; color: var(--accent); }

    .record-btn {
      display:flex; align-items:center; gap:8px;
      padding: 12px 20px; border-radius: 10px; border: 2px solid;
      cursor:pointer; font-size: .9rem; font-weight: 600; transition: all .2s;
    }
    .record-btn.idle { border-color: var(--danger); color: var(--danger); background: var(--surface); }
    .record-btn.idle:hover { background: #fef2f2; }
    .record-btn.recording { border-color: var(--danger); background: var(--danger); color: white; animation: pulse 1s ease infinite; }
    .record-dot { width:10px; height:10px; border-radius:50%; background:currentColor; }

    .audio-player { display:flex; align-items:center; gap:10px; padding: 12px 16px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); margin-top: 10px; }
    .audio-icon { font-size: 1.2rem; }

    /* TTS / Speech */
    .speak-btn {
      display:inline-flex; align-items:center; justify-content:center;
      width:28px; height:28px; border-radius:50%;
      border: 1.5px solid var(--primary-light); background: #eef2ff;
      color: var(--primary); cursor:pointer; font-size:.85rem;
      transition: all .2s; flex-shrink:0; padding:0;
    }
    .speak-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .speak-btn.speaking { background: var(--primary); color: white; animation: pulse .8s ease infinite; }
    .speak-btn-lg {
      display:inline-flex; align-items:center; gap:6px;
      padding: 8px 16px; border-radius:8px;
      border: 2px solid var(--primary-light); background: #eef2ff;
      color: var(--primary); cursor:pointer; font-size:.85rem; font-weight:600;
      transition: all .2s;
    }
    .speak-btn-lg:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .speak-btn-lg.speaking { background: var(--primary); color: white; animation: pulse .8s ease infinite; }

    .script-player { background: #eef2ff; border-radius:12px; padding:14px; border:2px solid var(--primary-light); margin-bottom:14px; }
    .script-player-header { font-size:.75rem; font-weight:700; color:var(--primary); margin-bottom:8px; letter-spacing:.05em; }
    .script-player-controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
    .player-btn { display:flex; align-items:center; justify-content:center; width:42px; height:42px; border-radius:50%; border:none; cursor:pointer; font-size:1.1rem; transition:all .2s; }
    .player-btn.play { background:var(--primary); color:white; box-shadow: 0 4px 12px rgba(79,70,229,.4); }
    .player-btn.play:hover { background:var(--primary-dark); transform: scale(1.08); }
    .player-btn.stop { background:var(--surface); color:var(--text-muted); border:1px solid var(--border); }
    .player-btn.stop:hover { background:var(--surface2); }
    .speed-select { padding:4px 8px; border-radius:6px; border:1px solid var(--border); font-size:.78rem; font-weight:600; color:var(--text); background:var(--surface); cursor:pointer; }
    .player-label { font-size:.78rem; color:var(--text-muted); }
    .sentence-highlight { background:#fde68a; border-radius:3px; padding:1px 2px; transition:background .3s; }
    .script-sentences { font-size:.88rem; line-height:1.9; color:var(--text); }

    /* Dictation */
    .dictation-area { width:100%; min-height: 80px; padding: 12px; border-radius: 8px; border: 2px solid var(--border); font-family: inherit; font-size: .9rem; resize: vertical; outline:none; transition: border-color .2s; }
    .dictation-area:focus { border-color: var(--primary); }

    /* Vocab List */
    .vocab-list-item { display:flex; gap:8px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items:baseline; }
    .vocab-list-item:last-child { border-bottom: none; }
    .vocab-list-word { font-weight: 600; color: var(--primary); font-size: .85rem; min-width: 160px; }
    .vocab-list-meaning { font-size: .85rem; color: var(--text-muted); }

    /* Progress */
    .progress-bar { height:4px; background: var(--surface2); border-radius: 2px; overflow:hidden; margin-top: 6px; }
    .progress-fill { height:100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 2px; transition: width .4s ease; }

    /* Day nav */
    .day-nav { display:flex; align-items:center; gap:10px; margin-bottom: 16px; }
    .day-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); cursor:pointer; font-size: .85rem; color: var(--text-muted); transition: all .2s; }
    .day-btn:hover { border-color: var(--primary-light); color: var(--primary); }
    .day-btn:disabled { opacity:.4; cursor:not-allowed; }
    .day-label { font-size: .85rem; font-weight: 600; color: var(--text); }

    /* Complete banner */
    .complete-banner { background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 12px; padding: 20px; text-align:center; margin-top: 16px; }
    .complete-banner h3 { font-size: 1.2rem; font-weight: 700; }
    .complete-banner p { font-size: .85rem; opacity: .9; margin-top: 6px; }

    /* Badge */
    .level-badge { display:inline-flex; align-items:center; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700; }
    .level-intermediate { background: #dbeafe; color: #1e40af; }
    .level-advanced { background: #fce7f3; color: #9d174d; }

    /* Section header */
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 16px; flex-wrap:wrap; gap:8px; }
    .section-title { font-size: 1.1rem; font-weight: 700; color: var(--text); display:flex; align-items:center; gap:8px; }
    .section-icon { font-size: 1.2rem; }

    /* Divider */
    .divider { height:1px; background: var(--border); margin: 16px 0; }

    /* Show answer */
    .show-answer-row { display:flex; align-items:center; gap:10px; margin-top: 10px; }
    .answer-text { font-size: .85rem; color: var(--success); font-weight: 600; }

    /* Summary */
    .summary-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px; }
    .summary-card { background: var(--surface2); border-radius: 10px; padding: 14px; text-align:center; border: 1px solid var(--border); }
    .summary-num { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .summary-label { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }

    /* Review Section */
    .review-search { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .review-search-input {
      flex:1; min-width:180px; padding:10px 14px; border-radius:8px; border:2px solid var(--border);
      font-family:inherit; font-size:.85rem; outline:none; transition: border-color .2s;
    }
    .review-search-input:focus { border-color: var(--primary); }
    .review-filter-btns { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:14px; }
    .filter-btn {
      padding:6px 12px; border-radius:20px; border:1.5px solid var(--border);
      background:var(--surface); color:var(--text-muted); cursor:pointer;
      font-size:.75rem; font-weight:600; transition:all .2s; white-space:nowrap;
    }
    .filter-btn:hover { border-color:var(--primary-light); color:var(--primary); }
    .filter-btn.active { border-color:var(--primary); background:var(--primary); color:white; }
    .review-day-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px; border-radius:8px; cursor:pointer;
      background:var(--surface2); border:1px solid var(--border);
      margin-bottom:6px; transition: all .2s;
    }
    .review-day-header:hover { background:#eef2ff; border-color:var(--primary-light); }
    .review-day-title { font-weight:700; font-size:.9rem; color:var(--text); }
    .review-day-topic { font-size:.75rem; color:var(--text-muted); }
    .review-category { font-size:.7rem; font-weight:700; color:var(--primary); padding:4px 10px; background:#eef2ff; border-radius:6px; margin:10px 0 6px; display:inline-block; }
    .review-word-row {
      display:flex; align-items:center; gap:8px; padding:8px 10px;
      border-bottom:1px solid var(--border); transition: background .15s;
    }
    .review-word-row:hover { background:#f8faff; }
    .review-word-row:last-child { border-bottom:none; }
    .review-word { font-weight:600; color:var(--primary-dark); font-size:.85rem; min-width:180px; }
    .review-meaning { font-size:.82rem; color:var(--text-muted); flex:1; }
    .review-example { font-size:.78rem; color:var(--text-light); font-style:italic; }
    .review-count { font-size:.75rem; color:var(--text-light); padding:2px 8px; background:var(--surface2); border-radius:10px; }
    .review-expr-card { padding:10px 14px; background:linear-gradient(135deg,#eef2ff,#e0e7ff); border-radius:8px; border:1px solid #c7d2fe; margin-bottom:6px; }
    .review-expr-text { font-weight:700; color:var(--primary-dark); font-size:.85rem; }
    .review-expr-usage { font-size:.72rem; color:var(--primary); margin-top:2px; }
    .review-expr-eg { font-size:.78rem; color:var(--text-muted); font-style:italic; margin-top:4px; }
    .update-btn {
      display:flex; align-items:center; gap:6px; padding:8px 16px;
      border-radius:8px; border:2px solid var(--secondary); background:#f0f9ff;
      color:var(--secondary); cursor:pointer; font-size:.85rem; font-weight:700;
      transition:all .2s;
    }
    .update-btn:hover { background:var(--secondary); color:white; }
    .update-spin { display:inline-block; animation: spin .6s linear; }
    @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

    @media (max-width: 640px) {
      .app-header { padding: 14px 16px; }
      .header-title { font-size: 1rem; }

// ===== TIMER HOOK =====
function useTimer(initialSeconds) {
  const [seconds, setSeconds] = useState(initialSeconds);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running && seconds > 0) {
      intervalRef.current = setInterval(() => setSeconds(s => s - 1), 1000);
    } else {
      clearInterval(intervalRef.current);
      if (seconds === 0) setRunning(false);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, seconds]);

  const start = () => setRunning(true);
  const pause = () => setRunning(false);
  const reset = () => { setRunning(false); setSeconds(initialSeconds); };
  return { seconds, running, start, pause, reset };
}

// ===== TIMER COMPONENT =====
function Timer({ totalSeconds = 300 }) {
  const { seconds, running, start, pause, reset } = useTimer(totalSeconds);
  const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
  const secs = (seconds % 60).toString().padStart(2, '0');
  const pct = (seconds / totalSeconds) * 100;
  const cls = seconds <= 30 ? 'danger' : seconds <= 60 ? 'warning' : '';
  return (
    <div className="timer-bar">
      <div>
        <div className={`timer-display ${cls}`}>{mins}:{secs}</div>
        <div className="timer-label">残り時間</div>
      </div>
      <div className="timer-progress">
        <div className="timer-progress-fill" style={{ width: `${pct}%` }} />
      </div>
      <button className="timer-btn reset" onClick={reset}>↺</button>
      {running
        ? <button className="timer-btn pause" onClick={pause}>⏸ タイマー停止</button>
        : <button className="timer-btn start" onClick={start}>⏱ タイマー開始</button>
      }
    </div>
  );
}

    if (selected !== null) return;
    setSelected(i);
    if (i === q.ans) setScore(s => s + 1);
  };
  const next = () => {
    if (idx + 1 < questions.length) {
      setIdx(i => i + 1);
      setSelected(null);
    } else {
      setDone(true);
      onComplete && onComplete(score + (selected === q.ans ? 1 : 0));
    }
  };
  const restart = () => { setIdx(0); setSelected(null); setScore(0); setDone(false); };

  if (done) {
    const final = score + (selected === q.ans ? 0 : 0);
    const pct = Math.round((score / questions.length) * 100);
    const cls = pct >= 80 ? 'good' : pct >= 50 ? 'ok' : 'bad';
    return (
      <div className="fade-in" style={{ textAlign: 'center', padding: '16px 0' }}>
        <div style={{ fontSize: '2.5rem', marginBottom: '8px' }}>{pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪'}</div>
        <div className={`score-badge ${cls}`} style={{ fontSize: '1rem', padding: '6px 16px' }}>
          {score} / {questions.length} 正解 ({pct}%)
        </div>
        <div style={{ fontSize: '.85rem', color: 'var(--text-muted)', margin: '12px 0' }}>
          {pct >= 80 ? '素晴らしい！' : pct >= 50 ? 'もう少しです！' : 'もう一度チャレンジしよう！'}
        </div>
        <button className="btn btn-secondary" onClick={restart}>もう一度</button>
      </div>
    );
  }

  return (
    <div className="fade-in">
      <div className="quiz-question">Q{idx + 1}. {q.q}</div>
      <div className="quiz-options">
        {q.opts.map((opt, i) => {
          let cls = 'quiz-opt';
          if (selected !== null) {
            cls += ' disabled';
            if (i === q.ans) cls += ' correct';
            else if (i === selected) cls += ' wrong';
          }
          return <button key={i} className={cls} onClick={() => handleSelect(i)}>{opt}</button>;
        })}
      </div>
      {selected !== null && (
        <div className={`quiz-result ${selected === q.ans ? 'correct' : 'wrong'}`}>
          {selected === q.ans ? '✓ 正解！' : `✗ 正解は「${q.opts[q.ans]}」`}
        </div>
      )}
      <div className="quiz-nav">
        <div className="quiz-progress">{idx + 1} / {questions.length}</div>
        {selected !== null && (
          <button className="btn btn-primary" onClick={next}>
            {idx + 1 < questions.length ? '次の問題 →' : '結果を見る'}
          </button>
        )}
      </div>
    </div>
  );
}

// ===== SPEECH UTILS =====
function useSpeech() {
  const [speaking, setSpeaking] = useState(false);
  const [currentIdx, setCurrentIdx] = useState(-1);
  const utterRef = useRef(null);

  const stop = useCallback(() => {
    window.speechSynthesis.cancel();
    setSpeaking(false);
    setCurrentIdx(-1);
  }, []);

  // Play array of sentences one by one, calling onSentence(i) on each
  const playSentences = useCallback((sentences, rate, onSentence) => {
    window.speechSynthesis.cancel();
    let idx = 0;
    const next = () => {
      if (idx >= sentences.length) { setSpeaking(false); setCurrentIdx(-1); return; }
      const u = new SpeechSynthesisUtterance(sentences[idx]);
      u.lang = 'en-US';
      u.rate = rate || 0.9;
      u.onstart = () => { setSpeaking(true); setCurrentIdx(idx); onSentence && onSentence(idx); };
      u.onend = () => { idx++; next(); };
      u.onerror = () => { setSpeaking(false); setCurrentIdx(-1); };
      utterRef.current = u;
      window.speechSynthesis.speak(u);
    };
    next();
  }, []);

  const speakText = useCallback((text, rate) => {
    const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
    playSentences(sentences.map(s => s.trim()).filter(Boolean), rate || 0.9, null);
  }, [playSentences]);

  return { speaking, currentIdx, stop, speakText, playSentences };
}

// Single word/phrase speak (stateless, no hook needed)
function SpeakBtn({ text, small = true }) {
  const [active, setActive] = useState(false);
  const speak = () => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.85;
    u.onstart = () => setActive(true);
    u.onend = () => setActive(false);
    u.onerror = () => setActive(false);
    window.speechSynthesis.speak(u);
  };
  if (small) {
    return <button className={`speak-btn ${active ? 'speaking' : ''}`} onClick={e => { e.stopPropagation(); speak(); }} title="音声を聞く">🔊</button>;
  }
  return <button className={`speak-btn-lg ${active ? 'speaking' : ''}`} onClick={speak}>🔊 {active ? '再生中...' : '音声を聞く'}</button>;
}

// Full script player with sentence highlighting
function ScriptPlayer({ script, label = 'スクリプトを聞く' }) {
  const [rate, setRate] = useState(0.85);
  const { speaking, currentIdx, stop, playSentences } = useSpeech();
  const [sentences, setSentences] = useState([]);

  useEffect(() => {
    const s = script.match(/[^.!?]+[.!?]*/g) || [script];
    setSentences(s.map(x => x.trim()).filter(Boolean));
  }, [script]);

  const play = () => {
    if (speaking) { stop(); return; }
    playSentences(sentences, rate, null);
  };

  const playSingle = (i) => {
    stop();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(sentences[i]);
      u.lang = 'en-US'; u.rate = rate;
      window.speechSynthesis.speak(u);
    }, 50);
  };

  return (
    <div className="script-player">
      <div className="script-player-header">🔊 音声再生プレイヤー</div>
      <div className="script-player-controls">
        <button className={`player-btn play`} onClick={play} title={speaking ? '停止' : '再生'}>
          {speaking ? '⏹' : '▶'}
        </button>
        <span className="player-label">{speaking ? '再生中...' : label}</span>
        <select className="speed-select" value={rate} onChange={e => { stop(); setRate(parseFloat(e.target.value)); }}>
          <option value={0.7}>遅い (0.7x)</option>
          <option value={0.85}>普通 (0.85x)</option>
          <option value={1.0}>速い (1.0x)</option>
          <option value={1.2}>最速 (1.2x)</option>
        </select>
      </div>
      <div className="script-sentences">
        {sentences.map((s, i) => (
          <span key={i}>
            <span
              className={currentIdx === i ? 'sentence-highlight' : ''}
              style={{ cursor: 'pointer' }}
              onClick={() => playSingle(i)}
              title="この文を再生"
            >{s}</span>{' '}
          </span>
        ))}
      </div>
      <div style={{ fontSize: '.72rem', color: 'var(--text-light)', marginTop: '6px' }}>
        💡 各文をクリックして個別に再生できます
      </div>
    </div>
  );
}

function TrainingSection({ data }) {
  const [step, setStep] = useState(0);
  const [doneSteps, setDoneSteps] = useState([]);
  const [showScript, setShowScript] = useState(false);
  const [dictation, setDictation] = useState('');
  const [showAnswer, setShowAnswer] = useState(false);
  const [recording, setRecording] = useState(false);
  const [recordings, setRecordings] = useState([]);
  const mediaRef = useRef(null);
  const chunksRef = useRef([]);

  const t = data.training;
  const STEPS = [
    { name: 'リピーティング', icon: '🔊', instruction: '各文を聞いて、同じように繰り返して発音してください。短いフレーズごとに区切り、リズムとイントネーションを意識しましょう。', tip: '「録音→再生→修正」を繰り返すと効果的です。' },
    { name: '音読', icon: '📖', instruction: 'スクリプトを見ながら、意味を理解しつつ音読してください。ニュースキャスターのように感情を込めて読みましょう。', tip: '自分の声を録音して客観的にチェックしてみてください。' },
    { name: 'ディクテーション', icon: '✍️', instruction: 'スクリプトを見ずに、聞こえた英語を下のテキストボックスに書き起こしてください。', tip: '前置詞・冠詞など機能語の聞き取りに注意しましょう。' },
    { name: 'オーバーラッピング', icon: '🎙️', instruction: 'スクリプトを見ながら、音声に重ねて同時に読み上げてください。音声のスピードに合わせることが重要です。', tip: '最初はゆっくりしたスピードで練習し、徐々に速くしましょう。' },
    { name: 'シャドーイング', icon: '👤', instruction: 'スクリプトを見ずに、音声を聞きながら0.5〜1秒遅れて後に続いて発話してください。', tip: 'リズム・イントネーション（プロソディ）と意味理解を同時に意識しましょう。' },
  ];

  const markDone = (i) => {
    if (!doneSteps.includes(i)) setDoneSteps(d => [...d, i]);
  };

  const startRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRef.current = new MediaRecorder(stream);
      chunksRef.current = [];
      mediaRef.current.ondataavailable = e => chunksRef.current.push(e.data);
      mediaRef.current.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        setRecordings(r => [...r, url]);
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRef.current.start();
      setRecording(true);
    } catch (e) {
      alert('マイクへのアクセスが必要です。ブラウザの設定を確認してください。');
    }
  };

  const stopRecording = () => {
    mediaRef.current?.stop();
    setRecording(false);
    markDone(step);
  };

  const currentStep = STEPS[step];
  const showDictation = step === 2;
  const hideScript = step === 2 || step === 4;

  return (
    <div className="fade-in">
      <Timer totalSeconds={300} />
      <div className="card">
        <div className="card-title"><span>🏋️</span> リスニングトレーニング</div>

          {STEPS.map((s, i) => (
            <button key={i} className={`step-tab ${step === i ? 'active' : ''} ${doneSteps.includes(i) ? 'done' : ''}`}
              onClick={() => setStep(i)}>
              <span className="step-badge">{doneSteps.includes(i) ? '✓' : i + 1}</span>
              {s.icon} {s.name}
            </button>
          ))}
        </div>

        <div className="training-step">
          <div className="step-title">Step {step + 1}: {currentStep.name}</div>
          <div className="step-instruction">{currentStep.instruction}</div>
          <div className="step-tip"><span className="tip-label">💡 ヒント: </span>{currentStep.tip}</div>
        </div>

        <div className="divider" />

        {/* Step 0: リピーティング — 音声再生 + スクリプト */}
        {step === 0 && (
          <div>
            <ScriptPlayer script={t.script} label="1文ずつ聞いて繰り返してみよう" />
            <div style={{ fontWeight: '700', fontSize: '.85rem', color: 'var(--text)', margin: '10px 0 6px' }}>📄 スクリプト（参照用）</div>
            <div className="script-display">{t.script}</div>
          </div>
        )}

        {/* Step 1: 音読 — スクリプト表示 */}
        {step === 1 && (
          <div>
            <ScriptPlayer script={t.script} label="音読のペースを確認しよう" />
            <div style={{ fontWeight: '700', fontSize: '.85rem', color: 'var(--text)', margin: '10px 0 6px' }}>📄 スクリプト（音読する）</div>
            <div className="script-display">{t.script}</div>
          </div>
        )}

        {/* Step 2: ディクテーション — 音声のみ、スクリプト隠す */}
        {step === 2 && (
          <div>
            <ScriptPlayer script={t.script} label="聞き取って書き起こそう（スクリプト非表示）" />
            <div style={{ fontWeight: '700', fontSize: '.85rem', color: 'var(--text)', margin: '10px 0 6px' }}>✍️ 書き起こし</div>
            <textarea
              className="dictation-area"
              placeholder="聞こえた英語をここに書いてください..."
              value={dictation}
              onChange={e => setDictation(e.target.value)}
            />
            {!showAnswer ? (
              <button className="btn btn-secondary" style={{ marginTop: '8px', fontSize: '.8rem' }} onClick={() => setShowAnswer(true)}>
                スクリプトを確認する
              </button>
            ) : (
              <div style={{ marginTop: '10px', padding: '12px', background: 'var(--surface2)', borderRadius: '8px', border: '1px solid var(--border)' }}>
                <div style={{ fontWeight: '700', fontSize: '.8rem', color: 'var(--text-muted)', marginBottom: '6px' }}>正解スクリプト:</div>
                <div style={{ fontSize: '.85rem', lineHeight: '1.7', color: 'var(--text)' }}>{t.script}</div>
              </div>
            )}
          </div>
        )}

        {/* Step 3: オーバーラッピング — 音声+スクリプト同時 */}
        {step === 3 && (
          <div>
            <ScriptPlayer script={t.script} label="音声に重ねて声を出して読もう" />
            <div style={{ fontWeight: '700', fontSize: '.85rem', color: 'var(--text)', margin: '10px 0 6px' }}>📄 スクリプト（見ながら読む）</div>
            <div className="script-display">{t.script}</div>
          </div>
        )}

        {/* Step 4: シャドーイング — 音声のみ、スクリプトは隠す */}
        {step === 4 && (
          <div>
            <ScriptPlayer script={t.script} label="音声を聞きながら直後に続いて発話しよう" />
            <div
              className="script-display"
              style={{ filter: 'blur(5px)', cursor: 'pointer', userSelect: 'none', transition: 'filter .3s' }}
              onClick={e => e.currentTarget.style.filter = 'none'}
              title="クリックでスクリプト表示"
            >
              {t.script}
              <div style={{ fontSize: '.75rem', color: 'var(--text-muted)', marginTop: '6px' }}>(クリックでスクリプト確認)</div>
            </div>
          </div>
        )}

        <div style={{ marginTop: '16px', display: 'flex', flexWrap: 'wrap', gap: '10px', alignItems: 'center' }}>
          <button
            className={`record-btn ${recording ? 'recording' : 'idle'}`}
            onClick={recording ? stopRecording : startRecording}
          >
            <span className="record-dot" />
            {recording ? '● 録音中... (停止)' : '🎤 録音する'}
          </button>
          {!recording && (
            <button className="btn btn-success" onClick={() => markDone(step)}>
              ✓ このステップ完了
            </button>
          )}
        </div>

        {recordings.length > 0 && (
          <div style={{ marginTop: '14px' }}>
            <div style={{ fontWeight: '700', fontSize: '.8rem', color: 'var(--text-muted)', marginBottom: '8px' }}>🎵 録音履歴</div>
            {recordings.map((url, i) => (
              <div key={i} className="audio-player">
                <span className="audio-icon">🔊</span>
                <audio controls src={url} style={{ flex: 1, height: '28px' }} />
                <span style={{ fontSize: '.75rem', color: 'var(--text-light)' }}>録音 #{i + 1}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {doneSteps.length === STEPS.length && (
        <div className="complete-banner animate-pop">
          <h3>🏆 全ステップ完了！</h3>
          <p>5つのトレーニングを全て終えました。今日のリスニング練習は完璧です！</p>
        </div>
      )}

      <div className="card" style={{ background: 'linear-gradient(135deg, #eef2ff, #e0e7ff)', border: '1px solid #c7d2fe' }}>
        <div style={{ fontWeight: '700', marginBottom: '12px', color: 'var(--primary-dark)' }}>📊 進捗</div>
        <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
          {STEPS.map((s, i) => (
            <div key={i} style={{
              padding: '6px 12px', borderRadius: '20px', fontSize: '.78rem', fontWeight: '600',
              background: doneSteps.includes(i) ? 'var(--success)' : 'white',
              color: doneSteps.includes(i) ? 'white' : 'var(--text-muted)',
              border: `1px solid ${doneSteps.includes(i) ? 'var(--success)' : 'var(--border)'}`,
            }}>
              {doneSteps.includes(i) ? '✓ ' : ''}{s.name}
            </div>
          ))}
        </div>
        <div className="progress-bar" style={{ marginTop: '12px', height: '8px' }}>
          <div className="progress-fill" style={{ width: `${(doneSteps.length / STEPS.length) * 100}%` }} />
        </div>
        <div style={{ fontSize: '.75rem', color: 'var(--text-muted)', marginTop: '4px' }}>
          {doneSteps.length} / {STEPS.length} ステップ完了
        </div>
      </div>
    </div>
  );
}

// ===== REVIEW SECTION =====
function ReviewSection() {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [openDays, setOpenDays] = useState([]);

  const toggleDay = (i) => setOpenDays(d => d.includes(i) ? d.filter(x => x !== i) : [...d, i]);
  const openAll = () => setOpenDays(CONTENT_DAYS.map((_, i) => i));
  const closeAll = () => setOpenDays([]);

  const FILTERS = [
    { key: 'all', label: 'すべて' },
    { key: 'vocab', label: '📚 語彙' },
    { key: 'listening', label: '🎧 リスニング語彙' },
    { key: 'reading', label: '📰 読解語彙' },
    { key: 'expressions', label: '💬 会議表現' },
  ];

  const matchSearch = (text) => {
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    return text.toLowerCase().includes(q);
  };

  // Count total items
  let totalCount = 0;
  CONTENT_DAYS.forEach(d => {
    if (filter === 'all' || filter === 'vocab') totalCount += d.vocabulary.filter(v => matchSearch(v.word + v.meaning + v.example)).length;
    if (filter === 'all' || filter === 'listening') totalCount += d.listening.vocabList.filter(v => matchSearch(v.word + v.meaning)).length;
    if (filter === 'all' || filter === 'reading') totalCount += d.reading.vocabList.filter(v => matchSearch(v.word + v.meaning)).length;
    if (filter === 'all' || filter === 'expressions') totalCount += d.reading.expressions.filter(e => matchSearch(e.expr + e.usage + e.eg)).length;
  });

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-title"><span>📋</span> 単語・表現 復習リスト <span className="review-count">{totalCount}件</span></div>
        <div className="review-search">
          <input
            className="review-search-input"
            placeholder="🔍 単語・表現を検索..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
        <div className="review-filter-btns">
          {FILTERS.map(f => (
            <button key={f.key} className={`filter-btn ${filter === f.key ? 'active' : ''}`}
              onClick={() => setFilter(f.key)}>{f.label}</button>
          ))}
          <button className="filter-btn" onClick={openAll} style={{marginLeft:'auto'}}>全て開く</button>
          <button className="filter-btn" onClick={closeAll}>閉じる</button>
        </div>
      </div>

      {CONTENT_DAYS.map((day, di) => {
        const vocabItems = (filter === 'all' || filter === 'vocab') ? day.vocabulary.filter(v => matchSearch(v.word + v.meaning + v.example)) : [];
        const listenItems = (filter === 'all' || filter === 'listening') ? day.listening.vocabList.filter(v => matchSearch(v.word + v.meaning)) : [];
        const readItems = (filter === 'all' || filter === 'reading') ? day.reading.vocabList.filter(v => matchSearch(v.word + v.meaning)) : [];
        const exprItems = (filter === 'all' || filter === 'expressions') ? day.reading.expressions.filter(e => matchSearch(e.expr + e.usage + e.eg)) : [];
        const count = vocabItems.length + listenItems.length + readItems.length + exprItems.length;
        if (count === 0) return null;

        const isOpen = openDays.includes(di);
        return (
          <div key={di} className="card" style={{ padding: '10px 14px' }}>
            <div className="review-day-header" onClick={() => toggleDay(di)}>
              <div>
                <span className="review-day-title">{day.date_label}</span>
                <span className="review-day-topic"> — {day.topic}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <span className="review-count">{count}語</span>
                <span style={{color:'var(--text-light)',fontSize:'.8rem'}}>{isOpen ? '▲' : '▼'}</span>
              </div>
            </div>
            {isOpen && (
              <div className="fade-in" style={{padding:'6px 0'}}>
                {vocabItems.length > 0 && (
                  <div>
                    <div className="review-category">📚 語彙（{vocabItems.length}語）</div>
                    {vocabItems.map((v, i) => (
                      <div key={i} className="review-word-row">
                        <SpeakBtn text={v.word} />
                        <span className="review-word">{v.word}</span>
                        <span className="review-meaning">{v.meaning}</span>
                      </div>
                    ))}
                  </div>
                )}
                {listenItems.length > 0 && (
                  <div>
                    <div className="review-category">🎧 リスニング語彙（{listenItems.length}語）</div>
                    {listenItems.map((v, i) => (
                      <div key={i} className="review-word-row">
                        <SpeakBtn text={v.word} />
                        <span className="review-word">{v.word}</span>
                        <span className="review-meaning">{v.meaning}</span>
                      </div>
                    ))}
                  </div>
                )}
                {readItems.length > 0 && (
                  <div>
                    <div className="review-category">📰 読解語彙（{readItems.length}語）</div>
                    {readItems.map((v, i) => (
                      <div key={i} className="review-word-row">
                        <SpeakBtn text={v.word} />
                        <span className="review-word">{v.word}</span>
                        <span className="review-meaning">{v.meaning}</span>
                      </div>
                    ))}
                  </div>
                )}
                {exprItems.length > 0 && (
                  <div>
                    <div className="review-category">💬 会議表現（{exprItems.length}つ）</div>
                    {exprItems.map((e, i) => (
                      <div key={i} className="review-expr-card">
                        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                          <SpeakBtn text={e.expr} />
                          <span className="review-expr-text">{e.expr}</span>
                        </div>
                        <div className="review-expr-usage">● {e.usage}</div>
                        <div className="review-expr-eg">例: {e.eg}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const today = new Date();
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
  const [dayIdx, setDayIdx] = useState((dayOfYear - 1) % CONTENT_DAYS.length);
  const [tab, setTab] = useState(0);
  const [completedSections, setCompletedSections] = useState(() => {
    try { return JSON.parse(localStorage.getItem('de_completed') || '{}'); } catch { return {}; }
  });
  const [streak, setStreak] = useState(() => {
    try { return parseInt(localStorage.getItem('de_streak') || '0'); } catch { return 0; }
  });

  const data = CONTENT_DAYS[dayIdx];
  const dateStr = today.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

  const [updating, setUpdating] = useState(false);

  const TABS = [
    { label: '語彙', icon: '📚', time: '5分' },
    { label: 'リスニング', icon: '🎧', time: '5分' },
    { label: '読解', icon: '📰', time: '5分' },
    { label: 'トレーニング', icon: '🏋️', time: '5分' },
    { label: '復習', icon: '📋', time: '' },
  ];

  const handleUpdate = () => {
    setUpdating(true);
    setTimeout(() => {
      setDayIdx(d => (d + 1) % CONTENT_DAYS.length);
      setUpdating(false);
    }, 500);
  };

  const todayKey = today.toISOString().split('T')[0];
  const todayCompleted = completedSections[todayKey] || [];
  const totalProgress = todayCompleted.length;

  const markSectionDone = (idx) => {
    const updated = { ...completedSections };
    if (!updated[todayKey]) updated[todayKey] = [];
    if (!updated[todayKey].includes(idx)) {
      updated[todayKey] = [...updated[todayKey], idx];
      setCompletedSections(updated);
      try { localStorage.setItem('de_completed', JSON.stringify(updated)); } catch {}
      if (updated[todayKey].length === 4) {
        const newStreak = streak + 1;
        setStreak(newStreak);
        try { localStorage.setItem('de_streak', newStreak); } catch {}
      }
    }
  };

  return (
    <div>
      <div className="app-header">
        <div className="header-inner">
          <div>
            <div className="header-title">Daily English 📖</div>
            <div className="header-date">{dateStr} — {data.date_label}: {data.topic}</div>
          </div>
          <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' }}>
            <div style={{ display: 'flex', gap: '6px' }}>
              {[0,1,2,3].map(i => (
                <div key={i} style={{
                  width: '10px', height: '10px', borderRadius: '50%',
                  background: todayCompleted.includes(i) ? '#34d399' : 'rgba(255,255,255,.3)',
                  border: '1px solid rgba(255,255,255,.5)',
                  transition: 'all .3s'
                }} />
              ))}
            </div>
            <div className="header-streak">🔥 {streak}日連続</div>
          </div>
        </div>
      </div>

      <div className="app-container">
        {/* Day Navigation */}
        <div className="day-nav" style={{ marginTop: '16px' }}>
          <button className="day-btn" onClick={() => setDayIdx(d => (d - 1 + CONTENT_DAYS.length) % CONTENT_DAYS.length)}>← 前</button>
          <div className="day-label">{data.date_label} / {CONTENT_DAYS.length}日分</div>
          <button className="day-btn" onClick={() => setDayIdx(d => (d + 1) % CONTENT_DAYS.length)}>次 →</button>
          <button className="update-btn" onClick={handleUpdate} disabled={updating}>
            <span className={updating ? 'update-spin' : ''}>🔄</span>
            {updating ? '更新中...' : 'コンテンツ更新'}
          </button>
        </div>

        {/* Progress Summary */}
        {totalProgress > 0 && (
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '10px', padding: '12px 16px', marginBottom: '4px', display: 'flex', alignItems: 'center', gap: '12px', boxShadow: 'var(--shadow)' }}>
            <div style={{ fontSize: '.85rem', color: 'var(--text-muted)', fontWeight: '600' }}>今日の進捗</div>
            <div style={{ flex: 1 }}>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${(totalProgress / 4) * 100}%` }} />
              </div>
            </div>
            <div style={{ fontSize: '.85rem', fontWeight: '700', color: 'var(--primary)' }}>{totalProgress}/4</div>
          </div>
        )}

        {/* Tabs */}
        <div className="section-tabs">
          {TABS.map((t, i) => (
            <button key={i} className={`tab-btn ${tab === i ? 'active' : ''}`} onClick={() => setTab(i)}>
              <span className="tab-num">{todayCompleted.includes(i) ? '✓' : i + 1}</span>
              {t.icon} {t.label}
              {t.time && <span style={{ fontSize: '.7rem', opacity: .8 }}>{t.time}</span>}
            </button>
          ))}
        </div>

        {/* Content */}
        {tab === 0 && <VocabSection data={data} key={`vocab-${dayIdx}`} />}
        {tab === 1 && <ListeningSection data={data} key={`listen-${dayIdx}`} />}
        {tab === 2 && <ReadingSection data={data} key={`reading-${dayIdx}`} />}
        {tab === 3 && <TrainingSection data={data} key={`training-${dayIdx}`} />}
        {tab === 4 && <ReviewSection key="review" />}

        {/* Complete Section Button (not for review tab) */}
        {tab < 4 && (
          <div style={{ textAlign: 'right', marginTop: '8px' }}>
            {!todayCompleted.includes(tab) && (
              <button className="btn btn-success" onClick={() => markSectionDone(tab)}>
                ✓ このセクションを完了にする
              </button>
            )}
            {todayCompleted.includes(tab) && (
              <span style={{ color: 'var(--success)', fontWeight: '700', fontSize: '.85rem' }}>✓ 完了済み</span>
            )}
          </div>
        )}

        {/* Completed All Today */}
        {totalProgress === 4 && (
          <div className="complete-banner animate-pop" style={{ marginTop: '20px' }}>
            <h3>🎉 今日の学習完了！</h3>
            <p>15分の英語学習を全て終えました。素晴らしい！明日も続けましょう。連続{streak}日達成！</p>
          </div>
        )}

        {/* Footer */}
        <div style={{ textAlign: 'center', marginTop: '32px', padding: '20px', borderTop: '1px solid var(--border)', color: 'var(--text-light)', fontSize: '.75rem' }}>
          Daily English — 毎日15分で英語力アップ<br/>
          語彙・リスニング・読解・トレーニングの4ステップ
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
